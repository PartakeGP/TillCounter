<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Till Count</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 30px auto;
      padding: 20px;
      line-height: 1.4;
      background: #f7f7f7;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }

    h1, h2 {
      margin-top: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 10px 16px;
      align-items: center;
      margin-bottom: 24px;
    }

    label {
      font-weight: 600;
    }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      font-size: 1rem;
    }

    .section-title {
      margin-top: 24px;
      margin-bottom: 10px;
      font-size: 1.1rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }

    .total-box {
      margin-top: 20px;
      padding: 16px;
      background: #eef4ee;
      border-radius: 10px;
      font-size: 1.2rem;
      font-weight: bold;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #222;
      color: white;
    }

    button:hover {
      opacity: 0.92;
    }

    .status {
      margin-top: 14px;
      font-weight: 600;
    }

    .note {
      color: #555;
      font-size: 0.95rem;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Till Count</h1>

    <form id="till-form">
      <input type="hidden" name="access_key" value="cf1f1da5-9d87-40e1-83b1-19685e99d4e4" />
      <input type="hidden" name="subject" value="Till Count Submission" />
      <input type="hidden" name="from_name" value="Partake Till Counter" />
      <input type="hidden" name="to" value="cat@partakegp.com" />
      <input type="hidden" name="total" id="total-hidden" value="0.00" />

      <div class="section-title">Associate</div>
      <div class="grid">
        <label for="associate">Associate Name</label>
        <input type="text" id="associate" name="associate_name" required />
      </div>

      <div class="section-title">Coins</div>
      <div class="grid">
        <label for="pennies">Pennies (.01)</label>
        <input type="number" id="pennies" name="pennies" min="0" step="1" value="" />

        <label for="nickels">Nickels (.05)</label>
        <input type="number" id="nickels" name="nickels" min="0" step="1" value="" />

        <label for="dimes">Dimes (.10)</label>
        <input type="number" id="dimes" name="dimes" min="0" step="1" value="" />

        <label for="quarters">Quarters (.25)</label>
        <input type="number" id="quarters" name="quarters" min="0" step="1" value="" />
      </div>

      <div class="section-title">Bills</div>
      <div class="grid">
        <label for="ones">$1</label>
        <input type="number" id="ones" name="ones" min="0" step="1" value="" />

        <label for="twos">$2</label>
        <input type="number" id="twos" name="twos" min="0" step="1" value="" />

        <label for="fives">$5</label>
        <input type="number" id="fives" name="fives" min="0" step="1" value="" />

        <label for="tens">$10</label>
        <input type="number" id="tens" name="tens" min="0" step="1" value="" />

        <label for="twenties">$20</label>
        <input type="number" id="twenties" name="twenties" min="0" step="1" value="" />

        <label for="fifties">$50</label>
        <input type="number" id="fifties" name="fifties" min="0" step="1" value="" />

        <label for="hundreds">$100</label>
        <input type="number" id="hundreds" name="hundreds" min="0" step="1" value="" />
      </div>

      <div class="total-box">
        Total: $<span id="total-display">0.00</span>
      </div>

      <button type="submit">Submit Till Count</button>
      <div class="status" id="status"></div>
      <div class="note">Enter the number of each coin or bill, not the dollar amount.</div>
    </form>
  </div>

  <script>
    const values = {
      pennies: 0.01,
      nickels: 0.05,
      dimes: 0.10,
      quarters: 0.25,
      ones: 1,
      twos: 2,
      fives: 5,
      tens: 10,
      twenties: 20,
      fifties: 50,
      hundreds: 100
    };

    const form = document.getElementById('till-form');
    const totalDisplay = document.getElementById('total-display');
    const totalHidden = document.getElementById('total-hidden');
    const statusBox = document.getElementById('status');

    function getCount(id) {
      const raw = document.getElementById(id).value;
      return raw === "" ? 0 : parseInt(raw, 10) || 0;
    }

    function calculateTotal() {
      let total = 0;
      for (const id in values) {
        total += getCount(id) * values[id];
      }
      totalDisplay.textContent = total.toFixed(2);
      totalHidden.value = total.toFixed(2);
    }

    Object.keys(values).forEach(id => {
      document.getElementById(id).addEventListener('input', calculateTotal);
    });

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      calculateTotal();
      statusBox.textContent = "Submitting...";

      const formData = new FormData(form);

      try {
        const response = await fetch("https://api.web3forms.com/submit", {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          statusBox.textContent = "Submitted successfully.";
          form.reset();
          calculateTotal();
        } else {
          statusBox.textContent = "Submission failed. Please try again.";
        }
      } catch (error) {
        statusBox.textContent = "Submission failed. Please check connection and try again.";
      }
    });

    calculateTotal();
  </script>
</body>
</html>
